name: CI

on:
  push:
    branches: [main, fix/ci-workflow]
  pull_request:
    branches: [main]
  workflow_dispatch:

jobs:
  build:
    name: Build (${{ matrix.os }})
    runs-on: ${{ matrix.os }}
    strategy:
      fail-fast: false
      matrix:
        os: [macos-latest, ubuntu-latest, windows-latest]

    steps:
      - name: Checkout code
        uses: actions/checkout@v4

      - name: Setup Go
        uses: actions/setup-go@v5
        with:
          go-version: '1.23'
          cache: true

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '20'
          cache: 'npm'
          cache-dependency-path: frontend/package-lock.json

      - name: Install Linux dependencies
        if: runner.os == 'Linux'
        run: |
          sudo apt-get update
          sudo apt-get install -y build-essential libgtk-3-dev libwebkit2gtk-4.1-dev

      - name: Install Wails CLI
        run: go install github.com/wailsapp/wails/v2/cmd/wails@latest

      - name: Install frontend dependencies
        working-directory: ./frontend
        run: npm ci

      - name: Build frontend
        working-directory: ./frontend
        run: npm run build

      - name: Run Go tests (with race)
        if: runner.os != 'Windows'
        run: go test -v -race -coverprofile=coverage.out ./...

      - name: Run Go tests (Windows, no race)
        if: runner.os == 'Windows'
        run: go test -v -coverprofile=coverage.out ./...

      - name: Build Wails app
        if: runner.os != 'Linux'
        run: wails build

      - name: Build Wails app (Linux, webkit2gtk-4.1)
        if: runner.os == 'Linux'
        run: wails build -tags webkit2_41

      - name: Upload build artifacts
        uses: actions/upload-artifact@v4
        with:
          name: ai-ide-${{ matrix.os }}
          path: build/bin/
          retention-days: 7

  release:
    name: Release
    needs: build
    runs-on: ubuntu-latest
    if: github.event_name == 'push' && startsWith(github.ref, 'refs/tags/v')

    steps:
      - name: Download macOS artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-ide-macos-latest
          path: release/macos

      - name: Download Linux artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-ide-ubuntu-latest
          path: release/linux

      - name: Download Windows artifact
        uses: actions/download-artifact@v4
        with:
          name: ai-ide-windows-latest
          path: release/windows

      - name: Create Release
        uses: softprops/action-gh-release@v1
        with:
          files: |
            release/macos/*
            release/linux/*
            release/windows/*
          draft: false
          prerelease: false
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}